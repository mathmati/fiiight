<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ikemen GO</title>
<style>
	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		background: #000;
		overflow: hidden;
	}
	#stage {
		position: fixed;
		inset: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		background: #000;
	}
	/* 16:9 letterboxed: as wide as fits, capped by viewport height. */
	#ikemen-canvas {
		display: block;
		background: #000;
		width: min(100vw, calc(100vh * 16 / 9));
		height: min(100vh, calc(100vw * 9 / 16));
	}
	#overlay {
		position: fixed;
		inset: 0;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 14px;
		background: #000;
		color: #ddd;
		font: 14px/1.5 system-ui, sans-serif;
		z-index: 10;
	}
	#overlay.hidden { display: none; }
	#overlay h1 {
		font-size: 20px;
		font-weight: 600;
		letter-spacing: 0.08em;
		margin: 0;
		color: #fff;
	}
	#progress-track {
		width: min(60vw, 420px);
		height: 8px;
		border-radius: 4px;
		background: #222;
		overflow: hidden;
	}
	#progress-bar {
		width: 0%;
		height: 100%;
		background: #e33;
		transition: width 0.1s linear;
	}
	#status { color: #999; }
	#error {
		display: none;
		max-width: min(90vw, 700px);
		max-height: 40vh;
		overflow: auto;
		white-space: pre-wrap;
		color: #f66;
		background: #180808;
		border: 1px solid #522;
		border-radius: 6px;
		padding: 10px 14px;
		font: 12px/1.4 ui-monospace, monospace;
	}
</style>
</head>
<body>
<div id="stage">
	<canvas id="ikemen-canvas" width="1280" height="720"></canvas>
</div>
<div id="overlay">
	<h1>IKEMEN GO</h1>
	<div id="progress-track"><div id="progress-bar"></div></div>
	<div id="status">Starting&hellip;</div>
	<pre id="error"></pre>
</div>
<script src="wasm_exec.js"></script>
<script src="fs-shim.js"></script>
<script src="main.js"></script>
</body>
</html>
