<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Ikemen GO</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20width='16'%20height='16'%20rx='3'%20fill='%23000'/%3E%3Cpath%20d='M4%203h3v10H4zM9%203h3v10H9z'%20fill='%23e33'/%3E%3C/svg%3E">
<!-- Installable / fullscreen on mobile: manifest for Android home-screen +
     fullscreen; apple-* tags for iPhone (which lacks element fullscreen) so
     Add to Home Screen launches chrome-less. Icon is the Ikemen GO app icon. -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ikemen GO">
<link rel="apple-touch-icon" href="icons/ikemen-180.png">
<style>
	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		background: #000;
		overflow: hidden;
	}
	#stage {
		position: fixed;
		inset: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		background: #000;
	}
	/* 16:9 letterboxed: as wide as fits, capped by viewport height. */
	#ikemen-canvas {
		display: block;
		background: #000;
		width: min(100vw, calc(100vh * 16 / 9));
		height: min(100vh, calc(100vw * 9 / 16));
	}
	#overlay {
		position: fixed;
		inset: 0;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 14px;
		background: #000;
		color: #ddd;
		font: 14px/1.5 system-ui, sans-serif;
		z-index: 10;
	}
	#overlay.hidden { display: none; }
	#overlay h1 {
		font-size: 20px;
		font-weight: 600;
		letter-spacing: 0.08em;
		margin: 0;
		color: #fff;
	}
	#progress-track {
		width: min(60vw, 420px);
		height: 8px;
		border-radius: 4px;
		background: #222;
		overflow: hidden;
	}
	#progress-bar {
		width: 0%;
		height: 100%;
		background: #e33;
		transition: width 0.1s linear;
	}
	#status { color: #999; }
	#credit {
		position: fixed;
		left: 0;
		right: 0;
		bottom: 4px;
		text-align: center;
		color: #555;
		font: 11px/1.4 system-ui, sans-serif;
		z-index: 5;
		pointer-events: none;
	}
	#credit a { color: #777; pointer-events: auto; }
	#error {
		display: none;
		max-width: min(90vw, 700px);
		max-height: 40vh;
		overflow: auto;
		white-space: pre-wrap;
		color: #f66;
		background: #180808;
		border: 1px solid #522;
		border-radius: 6px;
		padding: 10px 14px;
		font: 12px/1.4 ui-monospace, monospace;
	}
</style>
</head>
<body>
<div id="stage">
	<canvas id="ikemen-canvas" width="1280" height="720"></canvas>
</div>
<div id="overlay">
	<h1>IKEMEN GO</h1>
	<div id="progress-track"><div id="progress-bar"></div></div>
	<div id="status">Starting&hellip;</div>
	<pre id="error"></pre>
</div>
<div id="credit"><a href="https://github.com/ikemen-engine/Ikemen-GO">Ikemen GO</a> &mdash; engine MIT, assets CC-BY 3.0 Ikemen team &middot; <a href="https://github.com/mathmati/fiiight">browser port</a></div>
<script src="wasm_exec.js"></script>
<script src="fs-shim.js"></script>
<script src="main.js"></script>
<script src="touch.js"></script>
<script src="loader.js"></script>
<script src="fullscreen.js"></script>
</body>
</html>
